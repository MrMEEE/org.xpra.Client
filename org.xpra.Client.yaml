app-id: org.xpra.Client
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: xpra
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --filesystem=xdg-download
  - --filesystem=xdg-documents
  - --system-talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.gtk.vfs.*
  - --talk-name=org.a11y.Bus
  - --own-name=org.xpra.Client

modules:
  # libXres - X11 Resource extension library
  - name: libXres
    sources:
      - type: archive
        url: https://www.x.org/releases/individual/lib/libXres-1.2.3.tar.xz
        sha256: d2de8f5401d6c86a8992791654547eb8def585dfdc0c08cc16e24ef6aeeb69dc

  # Xpra itself - install with pip for dependencies
  - name: xpra
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
      env:
        PIP_PREFIX: /app
        PKG_CONFIG_PATH: /app/lib/pkgconfig:/app/lib/x86_64-linux-gnu/pkgconfig:/app/share/pkgconfig
        C_INCLUDE_PATH: /usr/include/pygobject-3.0:/usr/include/python3.13:/usr/include/cairo:/usr/include/pycairo:/app/include
        CFLAGS: -I/usr/include/pygobject-3.0 -I/usr/include/python3.13 -I/usr/include/cairo -I/usr/include/pycairo
    build-commands:
      # Install Python dependencies with pip (prefers wheels)
      - pip3 install --prefix=/app pycairo PyGObject paramiko cryptography pyopenssl lz4 pillow pyopengl pyopengl-accelerate netifaces zeroconf
      # Create directory for pkg-config files
      - mkdir -p /app/lib/pkgconfig
      # Generate pkg-config file for pycairo (pip doesn't install it)
      - |
        cat > /app/lib/pkgconfig/py3cairo.pc << EOF
        prefix=/app
        exec_prefix=\${prefix}
        includedir=\${prefix}/include
        datarootdir=\${prefix}/share
        datadir=\${datarootdir}
        
        Name: py3cairo
        Description: Python 3 bindings for cairo
        Version: 1.29.0
        Requires: cairo
        Cflags: -I\${includedir}/pycairo
        Libs: 
        EOF
      # Generate pkg-config file for pygobject (pip doesn't install it)
      - |
        cat > /app/lib/pkgconfig/pygobject-3.0.pc << EOF
        prefix=/app
        exec_prefix=\${prefix}
        includedir=\${prefix}/include
        datarootdir=\${prefix}/share
        datadir=\${datarootdir}
        
        Name: pygobject-3.0
        Description: Python 3 bindings for GObject
        Version: 3.56.0
        Requires: gobject-2.0 glib-2.0
        Cflags: -I\${includedir}/pygobject-3.0
        Libs: -L\${exec_prefix}/lib -lpygobject-3.0
        EOF
      # Install xpra itself
      - python3 setup.py install --prefix=/app --single-version-externally-managed --record=installed-files.txt
      # Install desktop integration files
      - install -Dm755 fs/bin/xpra /app/bin/xpra
      - install -Dm755 fs/bin/xpra_launcher /app/bin/xpra_launcher
      - install -Dm644 org.xpra.Client.desktop /app/share/applications/org.xpra.Client.desktop
      - install -Dm644 org.xpra.Client.metainfo.xml /app/share/metainfo/org.xpra.Client.metainfo.xml
      - install -Dm644 fs/share/xpra/icons/xpra.png /app/share/icons/hicolor/48x48/apps/org.xpra.Client.png
    sources:
      - type: archive
        url: https://api.github.com/repos/Xpra-org/xpra/tarball/v6.4.3
        sha256: 5f72e19f124227c93b205cf1ac4197ac8ca6cb15e9a2a9d61a13f85e790aa998
        dest-filename: xpra-6.4.3.tar.gz
      - type: file
        path: org.xpra.Client.desktop
      - type: file
        path: org.xpra.Client.metainfo.xml
